backend:
  name: github
  repo: tinkertrain/juanpablo.studio
  branch: main
  base_url: https://juanpablo.studio
  auth_endpoint: api/auth
  commit_messages:
    create: "Create {{collection}} “{{slug}}”"
    update: "Update {{collection}} “{{slug}}”"
    delete: "Delete {{collection}} “{{slug}}”"
    uploadMedia: "[skip ci] Upload “{{path}}”"
    deleteMedia: "[skip ci] Delete “{{path}}”"

# Run `npx decap-server` and load /admin/ from localhost to edit against your
# local git repo instead of GitHub. Ignored in production.
local_backend: true

media_folder: public/img
public_folder: /img

collections:
  - name: "studio"
    label: "Studio Paintings"
    folder: "src/content/studio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Medium", name: "medium", widget: "string", required: false }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options:
            [
              { label: "Oil", value: "oil" },
              { label: "Watercolor", value: "watercolor" },
              { label: "Gouache", value: "gouache" },
              { label: "Acrylic", value: "acrylic" },
              { label: "Mixed Media", value: "mixed-media" },
              { label: "Other", value: "other" },
            ],
        }
      - { label: "Cover image", name: "cover", widget: "image", choose_url: false }
      - {
          label: "Images",
          name: "images",
          widget: "list",
          field: { label: "Image", name: "image", widget: "image", choose_url: false },
        }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "urban"
    label: "Urban Sketching"
    folder: "src/content/urban"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Medium", name: "medium", widget: "string", required: false }
      - { label: "Cover image", name: "cover", widget: "image", choose_url: false }
      - {
          label: "Images",
          name: "images",
          widget: "list",
          field: { label: "Image", name: "image", widget: "image", choose_url: false },
        }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "pleinair"
    label: "Plein Air"
    folder: "src/content/pleinair"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          date_format: "DD/MM/YYYY",
          time_format: false,
          format: "YYYY-MM-DD",
        }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Medium", name: "medium", widget: "string", required: false }
      - { label: "Cover image", name: "cover", widget: "image", choose_url: false }
      - {
          label: "Images",
          name: "images",
          widget: "list",
          field: { label: "Image", name: "image", widget: "image", choose_url: false },
        }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/pages/index.md"
        label: "Home"
        name: "index"
        fields:
          - { label: "Template Key", name: "templateKey", widget: "hidden", default: "home" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Portrait", name: "portrait", widget: "image", choose_url: false, required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Intro", name: "body", widget: "markdown" }
